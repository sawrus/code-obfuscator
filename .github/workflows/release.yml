name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: code-obfuscator
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            bin: code-obfuscator.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: code-obfuscator
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/code-obfuscator-${{ matrix.target }}${{ endsWith(matrix.bin, '.exe') && '.exe' || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin }}-${{ matrix.target }}
          path: dist/code-obfuscator-${{ matrix.target }}${{ endsWith(matrix.bin, '.exe') && '.exe' || '' }}

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/**
