name: code-obfuscator-codex
ide: codex
mcp_server: code_obfuscator
required_tools:
  - ls_tree
  - ls_files
  - pull
  - clone
  - status
  - push
workflow:
  - ls_tree
  - clone
  - status
  - push
  - status
rules:
  - Reuse one options.request_id for all calls.
  - Use MCP runtime paths in tool calls.
  - Use host mirror path for shell edits when runtime path is not writable.
  - Require clean=false before push and clean=true after push.
  - Stop on any MCP tool-call error and return exact error message.
